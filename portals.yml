# Portal Scanner Configuration - PARIS / IDF FOCUS
# Uniquement des entreprises avec présence physique en Île-de-France et CDI français.

location_filter:
  - "paris"
  - "ile-de-france"
  - "île-de-france"
  - "ile de france"
  - "idf"
  - "grand paris"
  - "greater paris"
  - "paris area"
  - "la défense"
  - "la defense"
  - "paris intramuros"
  - "seine-et-marne"
  - "yvelines"
  - "essonne"
  - "hauts-de-seine"
  - "seine-saint-denis"
  - "val-de-marne"
  - "val-d'oise"

title_filter:
  positive:
    # -- AI Deployment & Strategy --
    - "AI Deployment"
    - "AI Strategy"
    - "AI Solutions"
    - "Applied AI"
    - "AI Architect"
    - "AI Implementation"
    - "AI Integration"
    - "AI Delivery"
    # -- Solutions & Architecture --
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Technical Account Manager"
    - "Strategic TAM"
    # -- Leadership & Product --
    - "Head of AI"
    - "AI Practice Lead"
    - "Technical Deployment Lead"
    - "Customer Success Lead"
    # -- Core AI Tech --
    - "LLM"
    - "Generative AI"
    - "GenAI"
    - "Agentic"
    - "RAG"
    - "NLP"
  negative:
    - "Junior"
    - "Intern"
    - "Stage"
    - "Alternance"
    - ".NET" # Optionnel, mais vous semblez migrer vers Python/LLM
    - "Java "
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

search_queries:
  - name: Paris AI Jobs — Solutions & Strategy
    query: '"Solutions Architect" OR "AI Strategy" OR "Forward Deployed" AI Paris site:linkedin.com/jobs'
    enabled: true

  - name: Welcome to the Jungle — IA Paris
    query: 'site:welcometothejungle.com "AI" OR "LLM" "Solutions" OR "Architect" Paris'
    enabled: true

  - name: Paris Startups — Ashby
    query: 'site:jobs.ashbyhq.com "AI" OR "Solutions" Paris'
    enabled: true

  - name: Paris Startups — Greenhouse
    query: 'site:boards.greenhouse.io "AI" OR "Solutions" Paris'
    enabled: true

tracked_companies:

  # -- The Paris AI Core (Labs & Pure Players) --

  - name: Mistral AI
    careers_url: https://jobs.lever.co/mistral
    notes: "Paris. Le champion européen."
    enabled: true

  - name: H (Holistic AI)
    careers_url: https://jobs.ashbyhq.com/hcompany
    notes: "Paris. Agents d'action. 200M$ levés."
    enabled: true

  - name: Dust
    careers_url: https://jobs.ashbyhq.com/dust
    notes: "Paris. IA pour la productivité interne. Ex-OpenAI."
    enabled: true

  - name: LightOn
    careers_url: https://www.welcometothejungle.com/fr/companies/lighton/jobs
    notes: "Paris. LLM pour grandes entreprises et souveraineté."
    enabled: true

  - name: Poolside
    careers_url: https://jobs.ashbyhq.com/poolside
    notes: "Paris. IA pour le software engineering."
    enabled: true

  - name: Hugging Face
    careers_url: https://apply.workable.com/hugging-face/
